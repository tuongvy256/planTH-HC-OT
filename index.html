<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✈️ Kế hoạch Thượng Hải - Hàng Châu - Ô Trấn</title>

<style>
:root{
    --primary:#7c5cff;
    --primary-dark:#5f44d6;
    --bg:#f4f5fb;
    --card:#ffffff;
    --text:#222;
    --sub:#666;
    --success:#22c55e;
    --danger:#ef4444;
    --border:#e5e7eb;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:
    Inter,
    system-ui,
    sans-serif;

    background:var(--bg);
    color:var(--text);
}

.container{
    max-width:1200px;
    margin:auto;
    padding:16px;
}

.header{
    background:linear-gradient(
        135deg,
        #7c5cff,
        #9c7cff
    );

    color:white;

    padding:24px;
    border-radius:20px;
    margin-bottom:20px;
}

.trip-title{
    font-size:28px;
    font-weight:700;
}

.trip-sub{
    margin-top:8px;
    opacity:.9;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    background:white;
    font-weight:600;
}

.tab-btn.active{
    background:var(--primary);
    color:white;
}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

.day-selector{
    display:flex;
    gap:8px;
    overflow:auto;
    margin-bottom:20px;
}

.day-btn{
    border:none;
    background:white;
    padding:10px 16px;
    border-radius:12px;
    cursor:pointer;
    white-space:nowrap;
}

.day-btn.active{
    background:var(--primary);
    color:white;
}

.timeline-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.timeline-card{
    background:var(--card);
    border-radius:18px;
    padding:16px;
    box-shadow:0 4px 10px rgba(0,0,0,.05);
}

.card-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.time-badge{
    font-weight:600;
}

.status{
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    cursor:pointer;
}

.status.pending{
    background:#fef3c7;
}

.status.done{
    background:#dcfce7;
}

.location{
    font-size:18px;
    font-weight:700;
}

.location-zh{
    color:var(--sub);
    margin-top:4px;
}

.content{
    margin-top:10px;
}

.meta{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:12px;
}

.meta-item{
    background:#f8f8f8;
    padding:8px 10px;
    border-radius:10px;
    font-size:14px;
}

.card-actions{
    display:flex;
    gap:10px;
    margin-top:14px;
}

.btn{
    border:none;
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
}

.btn-primary{
    background:var(--primary);
    color:white;
}

.btn-danger{
    background:var(--danger);
    color:white;
}

.floating-btn{
    position:fixed;
    bottom:20px;
    right:20px;

    width:60px;
    height:60px;

    border-radius:50%;
    border:none;

    background:var(--primary);
    color:white;

    font-size:28px;
    cursor:pointer;

    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.checklist-group{
    margin-bottom:20px;
}

.group-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:10px;
}

.check-item{
    background:white;
    padding:14px;
    border-radius:12px;
    margin-bottom:8px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.cost-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.cost-card{
    background:white;
    padding:20px;
    border-radius:18px;
}

.cost-title{
    color:var(--sub);
    margin-bottom:10px;
}

.cost-value{
    font-size:28px;
    font-weight:700;
}

.modal{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.4);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:999;
}

.modal.show{
    display:flex;
}

.modal-content{
    width:95%;
    max-width:700px;

    background:white;
    border-radius:20px;

    padding:20px;

    max-height:90vh;
    overflow:auto;
}

.form-group{
    margin-bottom:14px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:10px;
    border:1px solid var(--border);
    border-radius:12px;
}

textarea{
    min-height:100px;
}

.modal-actions{
    display:flex;
    gap:10px;
    margin-top:20px;
}

@media(max-width:768px){

    .trip-title{
        font-size:22px;
    }

}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="trip-title">
            🇨🇳 Thượng Hải - Hàng Châu - Ô Trấn
        </div>

        <div class="trip-sub">
            Kế hoạch du lịch vợ chồng
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active"
            onclick="switchTab('timeline')">
            🗓️ Lịch trình
        </button>

        <button class="tab-btn"
            onclick="switchTab('checklist')">
            🎒 Hành lý
        </button>

        <button class="tab-btn"
            onclick="switchTab('cost')">
            💰 Chi phí
        </button>
    </div>

    <!-- TIMELINE -->

    <div id="timelineTab"
         class="tab-content active">

        <div id="daySelector"
             class="day-selector">
        </div>

        <div id="timelineContainer"
             class="timeline-list">
        </div>

    </div>

    <!-- CHECKLIST -->

    <div id="checklistTab"
         class="tab-content">

        <div id="checklistContainer"></div>

    </div>

    <!-- COST -->

    <div id="costTab"
         class="tab-content">

        <div id="costContainer"
             class="cost-grid">
        </div>

    </div>

</div>

<button class="floating-btn"
        onclick="openMainModal()">
    +
</button>

<!-- TIMELINE MODAL -->

<div id="timelineModal"
     class="modal">

    <div class="modal-content">

        <h2>Thêm lịch trình</h2>

        <div class="form-group">
            <label>Ngày</label>
            <select id="dayNumber"></select>
        </div>

        <div class="form-group">
            <label>Khung giờ</label>
            <input id="timeSlot">
        </div>

        <div class="form-group">
            <label>Địa điểm</label>
            <input id="location">
        </div>

        <div class="form-group">
            <label>Tên tiếng Trung</label>
            <input id="locationZh">
        </div>

        <div class="form-group">
            <label>Nội dung</label>
            <textarea id="content"></textarea>
        </div>

        <div class="form-group">
            <label>Di chuyển</label>
            <input id="transport">
        </div>

        <div class="form-group">
            <label>Chi phí dự kiến</label>
            <input id="costEst"
                   type="number">
        </div>

        <div class="form-group">
            <label>Chi phí thực tế</label>
            <input id="costReal"
                   type="number">
        </div>

        <div class="form-group">
            <label>Ghi chú</label>
            <textarea id="notes"></textarea>
        </div>

        <div class="modal-actions">

            <button class="btn btn-primary"
                    onclick="saveTimeline()">
                Lưu
            </button>

            <button class="btn"
                    onclick="closeTimelineModal()">
                Đóng
            </button>

        </div>

    </div>

</div>

<!-- CHECKLIST MODAL -->

<div id="checklistModal"
     class="modal">

    <div class="modal-content">

        <h2>Thêm vật dụng</h2>

        <div class="form-group">

            <label>Danh mục</label>

            <select id="checkCategory">

                <option>📄 Giấy tờ</option>
                <option>👕 Quần áo</option>
                <option>💄 Mỹ phẩm</option>
                <option>🔌 Điện tử</option>
                <option>💊 Thuốc men</option>
                <option>🎒 Khác</option>

            </select>

        </div>

        <div class="form-group">

            <label>Tên vật dụng</label>

            <input id="checkItem">

        </div>

        <div class="modal-actions">

            <button class="btn btn-primary"
                    onclick="saveChecklist()">
                Lưu
            </button>

            <button class="btn"
                    onclick="closeChecklistModal()">
                Đóng
            </button>

        </div>

    </div>

</div>

<script>

let currentDay = 1;

</script>

</body>
</html>
