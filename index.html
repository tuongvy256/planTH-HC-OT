<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✈️ Kế hoạch Thượng Hải - Hàng Châu - Ô Trấn</title>

<style>
:root{
    --primary:#7c5cff;
    --primary-dark:#5f44d6;
    --bg:#f4f5fb;
    --card:#ffffff;
    --text:#222;
    --sub:#666;
    --success:#22c55e;
    --danger:#ef4444;
    --border:#e5e7eb;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:
    Inter,
    system-ui,
    sans-serif;

    background:var(--bg);
    color:var(--text);
}

.container{
    max-width:1200px;
    margin:auto;
    padding:16px;
}

.header{
    background:linear-gradient(
        135deg,
        #7c5cff,
        #9c7cff
    );

    color:white;

    padding:24px;
    border-radius:20px;
    margin-bottom:20px;
}

.trip-title{
    font-size:28px;
    font-weight:700;
}

.trip-sub{
    margin-top:8px;
    opacity:.9;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab-btn{
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    background:white;
    font-weight:600;
}

.tab-btn.active{
    background:var(--primary);
    color:white;
}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

.day-selector{
    display:flex;
    gap:8px;
    overflow:auto;
    margin-bottom:20px;
}

.day-btn{
    border:none;
    background:white;
    padding:10px 16px;
    border-radius:12px;
    cursor:pointer;
    white-space:nowrap;
}

.day-btn.active{
    background:var(--primary);
    color:white;
}

.timeline-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.timeline-card{
    background:var(--card);
    border-radius:18px;
    padding:16px;
    box-shadow:0 4px 10px rgba(0,0,0,.05);
}

.card-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.time-badge{
    font-weight:600;
}

.status{
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    cursor:pointer;
}

.status.pending{
    background:#fef3c7;
}

.status.done{
    background:#dcfce7;
}

.location{
    font-size:18px;
    font-weight:700;
}

.location-zh{
    color:var(--sub);
    margin-top:4px;
}

.content{
    margin-top:10px;
}

.meta{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:12px;
}

.meta-item{
    background:#f8f8f8;
    padding:8px 10px;
    border-radius:10px;
    font-size:14px;
}

.card-actions{
    display:flex;
    gap:10px;
    margin-top:14px;
}

.btn{
    border:none;
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
}

.btn-primary{
    background:var(--primary);
    color:white;
}

.btn-danger{
    background:var(--danger);
    color:white;
}

.floating-btn{
    position:fixed;
    bottom:20px;
    right:20px;

    width:60px;
    height:60px;

    border-radius:50%;
    border:none;

    background:var(--primary);
    color:white;

    font-size:28px;
    cursor:pointer;

    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.checklist-group{
    margin-bottom:20px;
}

.group-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:10px;
}

.check-item{
    background:white;
    padding:14px;
    border-radius:12px;
    margin-bottom:8px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.cost-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.cost-card{
    background:white;
    padding:20px;
    border-radius:18px;
}

.cost-title{
    color:var(--sub);
    margin-bottom:10px;
}

.cost-value{
    font-size:28px;
    font-weight:700;
}

.modal{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.4);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:999;
}

.modal.show{
    display:flex;
}

.modal-content{
    width:95%;
    max-width:700px;

    background:white;
    border-radius:20px;

    padding:20px;

    max-height:90vh;
    overflow:auto;
}

.form-group{
    margin-bottom:14px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:10px;
    border:1px solid var(--border);
    border-radius:12px;
}

textarea{
    min-height:100px;
}

.modal-actions{
    display:flex;
    gap:10px;
    margin-top:20px;
}

@media(max-width:768px){

    .trip-title{
        font-size:22px;
    }

}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="trip-title">
            🇨🇳 Thượng Hải - Hàng Châu - Ô Trấn
        </div>

        <div class="trip-sub">
            Kế hoạch du lịch vợ chồng
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active"
            onclick="switchTab('timeline')">
            🗓️ Lịch trình
        </button>

        <button class="tab-btn"
            onclick="switchTab('checklist')">
            🎒 Hành lý
        </button>

        <button class="tab-btn"
            onclick="switchTab('cost')">
            💰 Chi phí
        </button>
    </div>

    <!-- TIMELINE -->

    <div id="timelineTab"
         class="tab-content active">

        <div id="daySelector"
             class="day-selector">
        </div>

        <div id="timelineContainer"
             class="timeline-list">
        </div>

    </div>

    <!-- CHECKLIST -->

    <div id="checklistTab"
         class="tab-content">

        <div id="checklistContainer"></div>

    </div>

    <!-- COST -->

    <div id="costTab"
         class="tab-content">

        <div id="costContainer"
             class="cost-grid">
        </div>

    </div>

</div>

<button class="floating-btn"
        onclick="openMainModal()">
    +
</button>

<!-- TIMELINE MODAL -->

<div id="timelineModal"
     class="modal">

    <div class="modal-content">

        <h2>Thêm lịch trình</h2>

        <div class="form-group">
            <label>Ngày</label>
            <select id="dayNumber"></select>
        </div>

        <div class="form-group">
            <label>Khung giờ</label>
            <input id="timeSlot">
        </div>

        <div class="form-group">
            <label>Địa điểm</label>
            <input id="location">
        </div>

        <div class="form-group">
            <label>Tên tiếng Trung</label>
            <input id="locationZh">
        </div>

        <div class="form-group">
            <label>Nội dung</label>
            <textarea id="content"></textarea>
        </div>

        <div class="form-group">
            <label>Di chuyển</label>
            <input id="transport">
        </div>

        <div class="form-group">
            <label>Chi phí dự kiến</label>
            <input id="costEst"
                   type="number">
        </div>

        <div class="form-group">
            <label>Chi phí thực tế</label>
            <input id="costReal"
                   type="number">
        </div>

        <div class="form-group">
            <label>Ghi chú</label>
            <textarea id="notes"></textarea>
        </div>

        <div class="modal-actions">

            <button class="btn btn-primary"
                    onclick="saveTimeline()">
                Lưu
            </button>

            <button class="btn"
                    onclick="closeTimelineModal()">
                Đóng
            </button>

        </div>

    </div>

</div>

<!-- CHECKLIST MODAL -->

<div id="checklistModal"
     class="modal">

    <div class="modal-content">

        <h2>Thêm vật dụng</h2>

        <div class="form-group">

            <label>Danh mục</label>

            <select id="checkCategory">

                <option>📄 Giấy tờ</option>
                <option>👕 Quần áo</option>
                <option>💄 Mỹ phẩm</option>
                <option>🔌 Điện tử</option>
                <option>💊 Thuốc men</option>
                <option>🎒 Khác</option>

            </select>

        </div>

        <div class="form-group">

            <label>Tên vật dụng</label>

            <input id="checkItem">

        </div>

        <div class="modal-actions">

            <button class="btn btn-primary"
                    onclick="saveChecklist()">
                Lưu
            </button>

            <button class="btn"
                    onclick="closeChecklistModal()">
                Đóng
            </button>

        </div>

    </div>

</div>

<script>

let currentDay = 1;

let allTimeline = [];
let allChecklist = [];

document.addEventListener(
    'DOMContentLoaded',
    init
);

async function init() {

    buildDayButtons();

    buildDaySelect();

    await loadData();

}

function switchTab(tab) {

    document
        .querySelectorAll('.tab-content')
        .forEach(x => x.classList.remove('active'));

    document
        .querySelectorAll('.tab-btn')
        .forEach(x => x.classList.remove('active'));

    if(tab === 'timeline') {

        document
            .getElementById('timelineTab')
            .classList.add('active');

        document
            .querySelectorAll('.tab-btn')[0]
            .classList.add('active');

    }

    if(tab === 'checklist') {

        document
            .getElementById('checklistTab')
            .classList.add('active');

        document
            .querySelectorAll('.tab-btn')[1]
            .classList.add('active');

    }

    if(tab === 'cost') {

        document
            .getElementById('costTab')
            .classList.add('active');

        document
            .querySelectorAll('.tab-btn')[2]
            .classList.add('active');

    }

}

function buildDayButtons() {

    let html = '';

    for(let i=1;i<=10;i++) {

        html += `
        <button
            class="day-btn ${i===1?'active':''}"
            onclick="changeDay(${i})">
            Ngày ${i}
        </button>
        `;

    }

    document
        .getElementById('daySelector')
        .innerHTML = html;

}

function buildDaySelect() {

    let html='';

    for(let i=1;i<=10;i++) {

        html += `
        <option value="${i}">
            Ngày ${i}
        </option>
        `;

    }

    document
        .getElementById('dayNumber')
        .innerHTML = html;

}

function changeDay(day) {

    currentDay = day;

    document
        .querySelectorAll('.day-btn')
        .forEach(btn =>
            btn.classList.remove('active')
        );

    document
        .querySelectorAll('.day-btn')[day-1]
        .classList.add('active');

    renderTimeline();

}

async function loadData() {

    const res =
        await fetch('/api/data');

    const data =
        await res.json();

    allTimeline =
        data.timeline || [];

    allChecklist =
        data.checklist || [];

    renderTimeline();

    renderChecklist();

    renderCost();

}

function renderTimeline() {

    const container =
        document.getElementById(
            'timelineContainer'
        );

    const items =
        allTimeline.filter(
            x => Number(x.day_number)
            === currentDay
        );

    if(items.length === 0) {

        container.innerHTML = `
        <div class="timeline-card">
            Chưa có lịch trình
        </div>
        `;

        return;

    }

    let html = '';

    items.forEach(item => {

        html += `
        <div class="timeline-card">

            <div class="card-top">

                <div class="time-badge">
                    🕒 ${item.time_slot || ''}
                </div>

                <div class="status ${
                    item.status === 'Đã xong'
                    ? 'done'
                    : 'pending'
                }">

                    ${item.status}

                </div>

            </div>

            <div class="location">

                ${item.location}

            </div>

            <div class="location-zh">

                ${item.location_zh || ''}

            </div>

            <div class="content">

                ${item.content || ''}

            </div>

        </div>
        `;

    });

    container.innerHTML = html;

}

function renderChecklist() {

    const container =
        document.getElementById(
            'checklistContainer'
        );

    const groups = [
        '📄 Giấy tờ',
        '👕 Quần áo',
        '💄 Mỹ phẩm',
        '🔌 Điện tử',
        '💊 Thuốc men',
        '🎒 Khác'
    ];

    let html='';

    groups.forEach(group => {

        html += `
        <div class="checklist-group">

            <div class="group-title">
                ${group}
            </div>
        `;

        allChecklist
            .filter(x => x.category===group)
            .forEach(item => {

                html += `
                <div class="check-item">

                    <div>

                        ${
                            item.is_checked
                            ? '✅'
                            : '⬜'
                        }

                        ${item.item_name}

                    </div>

                </div>
                `;

            });

        html += '</div>';

    });

    container.innerHTML = html;

}

function renderCost() {

    const container =
        document.getElementById(
            'costContainer'
        );

    const est =
        allTimeline.reduce(
            (s,x)=>
                s + Number(
                    x.cost_est || 0
                ),
            0
        );

    const real =
        allTimeline.reduce(
            (s,x)=>
                s + Number(
                    x.cost_real || 0
                ),
            0
        );

    container.innerHTML = `

    <div class="cost-card">
        <div class="cost-title">
            Dự kiến
        </div>
        <div class="cost-value">
            ${est}
        </div>
    </div>

    <div class="cost-card">
        <div class="cost-title">
            Thực tế
        </div>
        <div class="cost-value">
            ${real}
        </div>
    </div>

    <div class="cost-card">
        <div class="cost-title">
            Mỗi người
        </div>
        <div class="cost-value">
            ${(real/2).toFixed(0)}
        </div>
    </div>

    `;

}
    function openMainModal() {

    const choice =
        confirm(
            'OK = Thêm lịch trình\n\nCancel = Thêm hành lý'
        );

    if(choice) {

        openTimelineModal();

    } else {

        openChecklistModal();

    }

}

// =========================
// TIMELINE MODAL
// =========================

function openTimelineModal() {

    document
        .getElementById('timelineModal')
        .classList.add('show');

}

function closeTimelineModal() {

    document
        .getElementById('timelineModal')
        .classList.remove('show');

}

// =========================
// CHECKLIST MODAL
// =========================

function openChecklistModal() {

    document
        .getElementById('checklistModal')
        .classList.add('show');

}

function closeChecklistModal() {

    document
        .getElementById('checklistModal')
        .classList.remove('show');

}

// =========================
// SAVE TIMELINE
// =========================

async function saveTimeline() {

    const payload = {

        day_number:
            Number(
                document
                .getElementById('dayNumber')
                .value
            ),

        time_slot:
            document
            .getElementById('timeSlot')
            .value,

        location:
            document
            .getElementById('location')
            .value,

        location_zh:
            document
            .getElementById('locationZh')
            .value,

        content:
            document
            .getElementById('content')
            .value,

        transport:
            document
            .getElementById('transport')
            .value,

        cost_est:
            Number(
                document
                .getElementById('costEst')
                .value || 0
            ),

        cost_real:
            Number(
                document
                .getElementById('costReal')
                .value || 0
            ),

        notes:
            document
            .getElementById('notes')
            .value

    };

    if(!payload.location) {

        alert(
            'Nhập địa điểm'
        );

        return;

    }

    const res =
        await fetch(
            '/api/timeline',
            {
                method:'POST',

                headers:{
                    'Content-Type':
                    'application/json'
                },

                body:
                JSON.stringify(
                    payload
                )
            }
        );

    const data =
        await res.json();

    if(data.success) {

        closeTimelineModal();

        clearTimelineForm();

        await loadData();

    } else {

        alert(
            data.error
        );

    }

}

// =========================
// SAVE CHECKLIST
// =========================

async function saveChecklist() {

    const payload = {

        category:
            document
            .getElementById(
                'checkCategory'
            )
            .value,

        item_name:
            document
            .getElementById(
                'checkItem'
            )
            .value

    };

    if(!payload.item_name) {

        alert(
            'Nhập tên vật dụng'
        );

        return;

    }

    const res =
        await fetch(
            '/api/checklist',
            {
                method:'POST',

                headers:{
                    'Content-Type':
                    'application/json'
                },

                body:
                JSON.stringify(
                    payload
                )
            }
        );

    const data =
        await res.json();

    if(data.success) {

        closeChecklistModal();

        document
            .getElementById(
                'checkItem'
            )
            .value='';

        await loadData();

    } else {

        alert(
            data.error
        );

    }

}

// =========================
// CLEAR FORM
// =========================

function clearTimelineForm() {

    document
        .getElementById('timeSlot')
        .value='';

    document
        .getElementById('location')
        .value='';

    document
        .getElementById('locationZh')
        .value='';

    document
        .getElementById('content')
        .value='';

    document
        .getElementById('transport')
        .value='';

    document
        .getElementById('costEst')
        .value='';

    document
        .getElementById('costReal')
        .value='';

    document
        .getElementById('notes')
        .value='';

}

// =========================
// CLICK OUTSIDE MODAL
// =========================

window.onclick =
function(event) {

    const timelineModal =
        document
        .getElementById(
            'timelineModal'
        );

    const checklistModal =
        document
        .getElementById(
            'checklistModal'
        );

    if(
        event.target ===
        timelineModal
    ) {

        closeTimelineModal();

    }

    if(
        event.target ===
        checklistModal
    ) {

        closeChecklistModal();

    }

};

</script>

</body>
</html>
