<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanghai Travel Plan 🇨🇳</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f6f4fa; 
            --card-bg: #ffffff;
            --primary: #9d8df1;  
            --primary-dark: #8271e2;
            --secondary: #b8c0ff; 
            --text-main: #3d3460;  
            --text-sub: #8a82a7;
            
            --status-pending: #f0eff5;
            --status-active: #e8e9ff;
            --status-done: #e3ffd6;
            --text-pending: #7a7393;
            --text-active: #5661e5;
            --text-done: #52a135;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 90px; /* Chừa không gian cho Bottom Navigation */
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #ffffff;
            padding: 30px 20px;
            text-align: center;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(157, 141, 241, 0.15);
        }

        .container {
            max-width: 600px;
            margin: 15px auto 0 auto;
            padding: 0 16px;
        }

        /* NAVIGATION BAR */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            box-shadow: 0 -4px 20px rgba(61, 52, 96, 0.08);
            z-index: 999;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            gap: 4px;
            transition: color 0.2s ease;
        }

        .nav-item.active { color: var(--primary-dark); }
        .nav-item span { font-size: 1.3rem; }

        .app-module { display: none; }
        .app-module.active { display: block; }

        /* TABS CHỌN NGÀY */
        .day-tabs {
            display: flex;
            background: var(--card-bg);
            padding: 6px;
            border-radius: 20px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            overflow-x: auto;
        }

        .day-btn {
            flex: 1; text-align: center; padding: 10px 12px;
            background: none; border: none; color: var(--text-sub);
            font-size: 0.85rem; font-weight: 700; cursor: pointer;
            border-radius: 15px; white-space: nowrap;
        }

        .day-btn.active { background: var(--primary); color: #ffffff; }

        /* DASHBOARD CHI PHÍ THEO NGÀY */
        .day-dashboard {
            background: #fff;
            border-radius: 18px;
            padding: 12px 16px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(157, 141, 241, 0.05);
            border: 1px solid rgba(157, 141, 241, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .day-dashboard .dash-title {
            font-size: 0.8rem; font-weight: 700; color: var(--text-main);
        }
        .day-dashboard .dash-grid {
            display: flex; gap: 15px;
        }
        .day-dashboard .dash-box {
            text-align: right;
        }
        .day-dashboard .dash-box div { font-size: 0.7rem; color: var(--text-sub); font-weight: 700; }
        .day-dashboard .dash-box span { font-size: 0.9rem; font-weight: 700; color: var(--primary-dark); }

        /* CARD LỊCH TRÌNH */
        .timeline-card {
            background: var(--card-bg); border-radius: 24px; padding: 16px;
            margin-bottom: 15px; box-shadow: 0 6px 12px rgba(157, 141, 241, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

        .time-badge {
            background: #fdf0ff; color: var(--primary-dark);
            padding: 4px 10px; border-radius: 10px; font-size: 0.8rem; font-weight: 700;
        }

        .status-badge { padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; cursor: pointer; }
        .status-badge.pending { background: var(--status-pending); color: var(--text-pending); }
        .status-badge.active { background: var(--status-active); color: var(--text-active); }
        .status-badge.done { background: var(--status-done); color: var(--text-done); }

        .location-link {
            font-size: 1.15rem; font-weight: 700; color: var(--primary-dark);
            text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 2px;
        }

        .location-zh { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 8px; font-style: italic; }
        
        .card-block {
            font-size: 0.9rem; background: #fcfbfe; padding: 10px 12px;
            border-radius: 14px; margin-bottom: 8px; line-height: 1.45;
        }
        .card-block strong { color: var(--primary-dark); display: block; margin-bottom: 2px; font-size: 0.8rem; text-transform: uppercase;}

        .card-costs-summary { border-top: 1px dashed #ebeeef; padding-top: 8px; margin-top: 8px; font-size: 0.8rem; }
        .cost-mini-row { display: flex; justify-content: space-between; padding: 2px 0; color: var(--text-main); }
        .card-footer-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--text-sub); margin-top: 10px; }

        /* BẢNG TỔNG TIỀN VÍ TIỀN */
        .summary-card {
            background: linear-gradient(135deg, #ffffff, #fdfbff);
            border-radius: 24px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 8px 16px rgba(157, 141, 241, 0.06);
            border: 1px solid rgba(157, 141, 241, 0.1);
        }
        .summary-header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; text-align: center; }
        .sum-box { background: #f8f6fc; padding: 12px; border-radius: 16px; border: 1px solid #f0ecf9; }
        .sum-box.highlight { background: #f0ecf9; border-color: var(--secondary); }
        .sum-box div { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 4px; font-weight: 700; }
        .sum-box span { font-size: 1.15rem; font-weight: 700; color: var(--primary-dark); }

        .table-finance { width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: left; }
        .table-finance th, .table-finance td { padding: 10px 8px; border-bottom: 1px solid #f0eff5; }
        .table-finance th { color: var(--text-sub); font-weight: 700; }
        .table-finance tr:last-child td { border-bottom: none; font-weight: 700; color: var(--primary-dark); }

        /* POPUP & LIST COST INPUT */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(61, 52, 96, 0.3); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
            opacity: 0; visibility: hidden; transition: all 0.25s ease; padding: 12px;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: var(--card-bg); border-radius: 28px; padding: 20px;
            width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
        }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 3px; color: var(--text-sub); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 9px 12px; border: 2px solid #edf0f2; border-radius: 12px; outline: none; font-size: 0.9rem;
        }
        .form-group input:focus { border-color: var(--primary); }

        .cost-input-item {
            background: #fbfafc; border: 1px solid #ece9f2; padding: 8px; border-radius: 12px; margin-bottom: 6px;
            display: grid; grid-template-columns: 2fr 1.5fr 1.5fr 1fr auto; gap: 4px; align-items: center;
        }
        .cost-input-item input, .cost-input-item select { padding: 6px; font-size: 0.8rem; border-radius: 8px; }
        .btn-add-cost-row {
            background: none; border: 1px dashed var(--primary); color: var(--primary-dark);
            width: 100%; padding: 6px; border-radius: 10px; font-size: 0.8rem; font-weight: 700; cursor: pointer; margin-top: 4px;
        }

        .modal-buttons { display: flex; gap: 8px; margin-top: 15px; }
        .btn-action { flex: 1; padding: 11px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 0.9rem;}
        .btn-action.save { background: var(--primary); color: white; }
        .btn-action.cancel { background: #f0eff5; color: var(--text-sub); }

        .fab-btn {
            position: fixed; bottom: 85px; right: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white;
            border: none; width: 52px; height: 52px; border-radius: 50%; font-size: 1.4rem;
            box-shadow: 0 4px 15px rgba(157, 141, 241, 0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 98;
        }

        /* CHECKLIST HÀNH LÝ */
        .checklist-box { background: white; padding: 14px; border-radius: 20px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .checklist-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f8f8fa; }
        .checklist-row:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <div class="bottom-nav">
        <button class="nav-item active" id="nav-timeline" onclick="switchModule('timeline')">
            <span>📅</span>Lịch Trình
        </button>
        <button class="nav-item" id="nav-finance" onclick="switchModule('finance')">
            <span>💰</span>Ví Tiền
        </button>
        <button class="nav-item" id="nav-luggage" onclick="switchModule('luggage')">
            <span>🎒</span>Hành Lý
        </button>
    </div>

    <div class="header">
        <h1 style="font-size: 1.4rem;">Shanghai Travel Plan 🇨🇳</h1>
        <p style="font-size: 0.85rem; opacity: 0.9;">Giao diện Module tiện lợi trên điện thoại ✨</p>
    </div>

    <div class="container">
        
        <div id="module-timeline" class="app-module active">
            <div class="day-tabs" id="dayTabsZone"></div>
            
            <div class="day-dashboard">
                <div class="dash-title">💰 Chi phí Ngày <span id="lbl-dash-day">1</span></div>
                <div class="dash-grid">
                    <div class="dash-box">
                        <div>DỰ KIẾN</div>
                        <span id="lbl-dash-est">0đ</span>
                    </div>
                    <div class="dash-box">
                        <div>THỰC TẾ</div>
                        <span id="lbl-dash-real" style="color: #52a135;">0đ</span>
                    </div>
                </div>
            </div>

            <div id="timelineListZone"></div>
            <button class="fab-btn" onclick="openTimelineModal()">＋</button>
        </div>

        <div id="module-finance" class="app-module">
            <div class="summary-card">
                <h3 style="margin-bottom: 12px; text-align: center; font-size: 1rem; color: var(--primary-dark);">📊 Tổng Kết Chi Phí Toàn Chuyến</h3>
                <div class="summary-header-grid">
                    <div class="sum-box">
                        <div>TỔNG DỰ KIẾN</div>
                        <span id="txt-total-est">0đ</span>
                    </div>
                    <div class="sum-box highlight">
                        <div>TỔNG THỰC TẾ</div>
                        <span id="txt-total-real">0đ</span>
                    </div>
                </div>

                <table class="table-finance">
                    <thead>
                        <tr>
                            <th>Danh mục chi phí</th>
                            <th>Dự kiến (VND)</th>
                            <th>Thực tế (VND)</th>
                        </tr>
                    </thead>
                    <tbody id="financeTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="module-luggage" class="app-module">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <h3 style="font-size:1rem;">Danh sách hành lý chuẩn bị 🎒</h3>
                <button style="background:var(--primary); color:white; border:none; padding:6px 12px; border-radius:10px; font-size:0.8rem; font-weight:700;" onclick="openChecklistModal()">+ Thêm đồ</button>
            </div>
            <div id="luggageListZone"></div>
        </div>

    </div>

    <div class="modal-overlay" id="timelineModal">
        <div class="modal-content">
            <h3 style="margin-bottom:12px; text-align:center; font-size:1.1rem; color:var(--primary-dark);" id="modalTitle">Thêm Điểm Mới ✨</h3>
            <input type="hidden" id="formTimelineId">
            
            <div class="form-group">
                <label>Ngày thứ mấy?</label>
                <input type="number" id="formDayNumber" min="1" max="10">
            </div>
            <div class="form-group">
                <label>Khung giờ</label>
                <input type="text" id="formTimeSlot" placeholder="Ví dụ: 09:00 - 11:30">
            </div>
            <div class="form-group">
                <label>Tên điểm đi (Tiếng Việt)</label>
                <input type="text" id="formLocation" placeholder="Ví dụ: Tháp Truyền Hình Minh Châu Phương Đông">
            </div>
            <div class="form-group">
                <label>Tên điểm đi (Tiếng Trung - Click mở Amap)</label>
                <input type="text" id="formLocationZh" placeholder="Ví dụ: 东方明珠">
            </div>
            <div class="form-group">
                <label>Nội dung chi tiết hoạt động</label>
                <textarea id="formContent" rows="2" placeholder="Ăn gì chơi gì ở đây nà..."></textarea>
            </div>
            <div class="form-group">
                <label>Hướng dẫn di chuyển / Đường đi</label>
                <textarea id="formTransportGuide" rows="2" placeholder="Option 1: Metro Line 2..."></textarea>
            </div>
            <div class="form-group">
                <label>Ghi chú riêng</label>
                <textarea id="formNotes" rows="1" placeholder="Nhắc nhở riêng..."></textarea>
            </div>
            <div class="form-group">
                <label>Trạng thái</label>
                <select id="formStatus">
                    <option value="Chưa đi">Chưa đi ✈️</option>
                    <option value="Đang đi">Đang đi 🚗</option>
                    <option value="Đã xong">Đã xong ✅</option>
                </select>
            </div>

            <div style="margin-top:12px; border-top:1px solid #f0eff5; padding-top:10px;">
                <label style="font-size:0.8rem; font-weight:700; color:var(--primary-dark);">💰 Danh Sách Các Khoản Chi Phí Phân Loại</label>
                <div id="costFormRowsContainer" style="margin-top:6px;"></div>
                <button type="button" class="btn-add-cost-row" onclick="addCostInputRow()">＋ Thêm một khoản chi phí</button>
            </div>

            <div class="modal-buttons">
                <button class="btn-action cancel" onclick="closeModal('timelineModal')">Đóng</button>
                <button class="btn-action save" onclick="saveTimelineBigData()">Lưu Lịch Trình</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="checklistModal">
        <div class="modal-content">
            <h3 style="margin-bottom:12px; text-align:center;">Thêm Đồ Vào Vali 🎒</h3>
            
            <div class="form-group">
                <label>Danh mục phân loại</label>
                <select id="formChecklistCategory" onchange="checkCustomCategory(this.value)">
                    <option value="Giấy tờ">📄 Giấy tờ quan trọng</option>
                    <option value="Quần áo">👗 Quần áo & Giày dép</option>
                    <option value="Mỹ phẩm">💄 Mỹ phẩm & Skincare</option>
                    <option value="Thiết bị công nghệ">🔌 Thiết bị công nghệ</option>
                    <option value="Thuốc men">💊 Thuốc men & Y tế</option>
                    <option value="Khác">🧸 Đồ dùng khác</option>
                    <option value="__CUSTOM__">➕ [Thêm danh mục mới...]</option>
                </select>
            </div>

            <div class="form-group" id="customCategoryWrapper" style="display: none;">
                <label>Tên danh mục mới bà muốn thêm:</label>
                <input type="text" id="formChecklistCustomCategory" placeholder="Ví dụ: Đồ ăn vặt mang theo">
            </div>

            <div class="form-group">
                <label>Tên món đồ cần mang</label>
                <input type="text" id="formChecklistItemName" placeholder="Ví dụ: Củ sạc đa năng">
            </div>
            
            <div class="modal-buttons">
                <button class="btn-action cancel" onclick="closeModal('checklistModal')">Hủy</button>
                <button class="btn-action save" onclick="saveChecklistData()">Thêm Luôn</button>
            </div>
        </div>
    </div>

    <script>
        let currentDay = 1;
        let globalTimelineData = [];
        let globalChecklistData = [];
        const RATE = 3900;

        function switchModule(moduleName) {
            document.querySelectorAll('.app-module').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`module-${moduleName}`).classList.add('active');
            document.getElementById(`nav-${moduleName}`).classList.add('active');
        }

        async function fetchAllData() {
            const res = await fetch('/api/data');
            const data = await res.json();
            globalTimelineData = data.timeline || [];
            globalChecklistData = data.checklist || [];
            
            renderTabs();
            renderTimeline();
            renderFinanceSummary();
            renderChecklist();
        }

        function renderTabs() {
            const container = document.getElementById('dayTabsZone');
            let maxDay = 6;
            globalTimelineData.forEach(item => { if(item.day_number > maxDay) maxDay = item.day_number; });
            let html = '';
            for(let i = 1; i <= maxDay; i++) {
                html += `<button class="day-btn ${i === currentDay ? 'active' : ''}" onclick="switchDay(${i})">Ngày ${i}</button>`;
            }
            container.innerHTML = html;
        }

        function switchDay(day) {
            currentDay = day;
            renderTabs();
            renderTimeline();
        }

        function renderTimeline() {
            document.getElementById('lbl-dash-day').innerText = currentDay;
            const container = document.getElementById('timelineListZone');
            const filtered = globalTimelineData.filter(item => item.day_number === currentDay);

            // TÍNH TOÁN CHI PHÍ RIÊNG CHO DASHBOARD CỦA NGÀY HIỆN TẠI
            let dayEst = 0;
            let dayReal = 0;
            filtered.forEach(item => {
                if(item.costs && item.costs.length > 0) {
                    item.costs.forEach(c => {
                        let valVnd = c.currency === 'CNY' ? c.amount * RATE : c.amount;
                        if(c.cost_type === 'Dự kiến') dayEst += valVnd;
                        else dayReal += valVnd;
                    });
                }
            });
            document.getElementById('lbl-dash-est').innerText = dayEst.toLocaleString() + ' đ';
            document.getElementById('lbl-dash-real').innerText = dayReal.toLocaleString() + ' đ';

            if(filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-sub); font-size:0.85rem;">Hôm nay chưa xếp lịch đi đâu hết bà ơi, bấm nút ＋ để lên đồ đi quẩy thui!</div>`;
                return;
            }

            let html = '';
            filtered.forEach(item => {
                let statusClass = 'pending';
                if(item.status === 'Đang đi') statusClass = 'active';
                if(item.status === 'Đã xong') statusClass = 'done';

                const searchKeyword = item.location_zh ? item.location_zh : item.location;
                const amapUrl = `https://www.amap.com/search?query=${encodeURIComponent(searchKeyword)}`;

                let costRowsHtml = '';
                if(item.costs && item.costs.length > 0) {
                    item.costs.forEach(c => {
                        let valVnd = c.currency === 'CNY' ? c.amount * RATE : c.amount;
                        costRowsHtml += `<div class="cost-mini-row"><span>• ${c.cost_name} (${c.category}) [${c.cost_type}]:</span> <strong>${c.currency === 'CNY' ? c.amount+'¥' : ''} ~ ${valVnd.toLocaleString()} đ</strong></div>`;
                    });
                }

                html += `
                    <div class="timeline-card">
                        <div class="card-top">
                            <span class="time-badge">🕒 ${item.time_slot || 'Chưa định giờ'}</span>
                            <span class="status-badge ${statusClass}" onclick="quickToggleStatus(${item.id}, '${item.status}')">
                                ${item.status || 'Chưa đi'}
                            </span>
                        </div>
                        
                        <a href="${amapUrl}" target="_blank" class="location-link">
                            📍 ${item.location} <span style="font-size:0.8rem; color:var(--text-sub)">🗺️</span>
                        </a>
                        ${item.location_zh ? `<div class="location-zh">🇨🇳 ${item.location_zh}</div>` : ''}
                        
                        ${item.content ? `<div class="card-block"><strong>🎯 Hoạt động</strong>${item.content.replace(/\n/g, '<br>')}</div>` : ''}
                        ${item.transport_guide ? `<div class="card-block" style="background:#f4fbf7; border-left:3px solid #52a135;"><strong>🚇 Hướng dẫn đường đi</strong>${item.transport_guide.replace(/\n/g, '<br>')}</div>` : ''}
                        ${item.notes ? `<div class="card-block" style="background:#fffdf2; border-left:3px solid #ffcb00;"><strong>📌 Ghi chú riêng</strong>${item.notes.replace(/\n/g, '<br>')}</div>` : ''}
                        
                        ${costRowsHtml ? `<div class="card-costs-summary">${costRowsHtml}</div>` : ''}

                        <div class="card-footer-meta">
                            <span style="color:var(--primary-dark); font-weight:700; cursor:pointer;" onclick="editTimeline(${item.id})">✏️ Chỉnh sửa</span>
                            <button class="btn-mini-delete" onclick="deleteTimeline(${item.id})">🗑️ Xóa</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderFinanceSummary() {
            let totalEstAll = 0;
            let totalRealAll = 0;

            const cats = ["Di chuyển", "Ăn uống", "Vui chơi", "Mua sắm", "Khác"];
            const sumData = {};
            cats.forEach(c => sumData[c] = { est: 0, real: 0 });

            globalTimelineData.forEach(item => {
                if(item.costs && item.costs.length > 0) {
                    item.costs.forEach(c => {
                        let valueInVnd = c.currency === 'CNY' ? c.amount * RATE : c.amount;
                        let categoryKey = cats.includes(c.category) ? c.category : "Khác";
                        
                        if(c.cost_type === "Dự kiến") {
                            sumData[categoryKey].est += valueInVnd;
                            totalEstAll += valueInVnd;
                        } else {
                            sumData[categoryKey].real += valueInVnd;
                            totalRealAll += valueInVnd;
                        }
                    });
                }
            });

            document.getElementById('txt-total-est').innerText = totalEstAll.toLocaleString() + ' đ';
            document.getElementById('txt-total-real').innerText = totalRealAll.toLocaleString() + ' đ';

            let html = '';
            cats.forEach(c => {
                html += `
                    <tr>
                        <td style="font-weight:600;">${c}</td>
                        <td style="color:var(--text-sub);">${sumData[c].est.toLocaleString()} đ</td>
                        <td style="color:var(--text-main); font-weight:700;">${sumData[c].real.toLocaleString()} đ</td>
                    </tr>
                `;
            });

            html += `
                <tr style="background:#f9f8fe;">
                    <td><strong>Tổng cộng</strong></td>
                    <td style="color:var(--text-sub);"><strong>${totalEstAll.toLocaleString()} đ</strong></td>
                    <td style="color:var(--primary-dark); font-size:1rem;"><strong>${totalRealAll.toLocaleString()} đ</strong></td>
                </tr>
            `;
            document.getElementById('financeTableBody').innerHTML = html;
        }

        function renderChecklist() {
            const container = document.getElementById('luggageListZone');
            if(globalChecklistData.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-sub);">Chưa xếp món đồ nào vào vali luôn!</div>`;
                return;
            }
            const groups = {};
            globalChecklistData.forEach(item => {
                const cat = item.category || "Đồ dùng khác";
                if(!groups[cat]) groups[cat] = [];
                groups[cat].push(item);
            });
            let html = '';
            for(const cat in groups) {
                html += `<div class="checklist-box"><div style="font-weight:700; color:var(--primary-dark); font-size:0.9rem; margin-bottom:8px; border-left:3px solid var(--primary); padding-left:6px;">${cat}</div>`;
                groups[cat].forEach(item => {
                    const isChecked = item.is_checked === 1;
                    html += `
                        <div class="checklist-row">
                            <div class="chk-left ${isChecked ? 'checked' : ''}" onclick="toggleChecklist(${item.id}, ${!isChecked})" style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                                <span>${isChecked ? '✅' : '⬜'}</span>
                                <span style="${isChecked ? 'text-decoration:line-through; color:var(--text-sub);' : ''}">${item.item_name}</span>
                            </div>
                            <button class="btn-mini-delete" onclick="deleteChecklistItem(${item.id})">🗑️</button>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        function addCostInputRow(data = { cost_name:'', category:'Di chuyển', amount:0, currency:'CNY', cost_type:'Dự kiến' }) {
            const container = document.getElementById('costFormRowsContainer');
            const row = document.createElement('div');
            row.className = 'cost-input-item';
            row.innerHTML = `
                <input type="text" placeholder="Tên phí" class="c-name" value="${data.cost_name}">
                <select class="c-cat">
                    <option value="Di chuyển" ${data.category==='Di chuyển'?'selected':''}>Di chuyển</option>
                    <option value="Ăn uống" ${data.category==='Ăn uống'?'selected':''}>Ăn uống</option>
                    <option value="Vui chơi" ${data.category==='Vui chơi'?'selected':''}>Vui chơi</option>
                    <option value="Mua sắm" ${data.category==='Mua sắm'?'selected':''}>Mua sắm</option>
                    <option value="Khác" ${data.category==='Khác'?'selected':''}>Khác</option>
                </select>
                <input type="number" placeholder="Số tiền" class="c-amount" value="${data.amount}">
                <select class="c-curr">
                    <option value="CNY" ${data.currency==='CNY'?'selected':''}>CNY (¥)</option>
                    <option value="VND" ${data.currency==='VND'?'selected':''}>VND (đ)</option>
                </select>
                <select class="c-type">
                    <option value="Dự kiến" ${data.cost_type==='Dự kiến'?'selected':''}>Dự kiến</option>
                    <option value="Thực tế" ${data.cost_type==='Thực tế'?'selected':''}>Thực tế</option>
                </select>
                <button type="button" style="background:none; border:none; color:red; font-weight:700;" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);
        }

        function getCostsFromForm() {
            const rows = document.querySelectorAll('.cost-input-item');
            const arr = [];
            rows.forEach(row => {
                const name = row.querySelector('.c-name').value.trim();
                const amount = parseFloat(row.querySelector('.c-amount').value) || 0;
                if(name) {
                    arr.push({
                        cost_name: name,
                        category: row.querySelector('.c-cat').value,
                        amount: amount,
                        currency: row.querySelector('.c-curr').value,
                        cost_type: row.querySelector('.c-type').value
                    });
                }
            });
            return arr;
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function openTimelineModal() {
            document.getElementById('modalTitle').innerText = "Thêm Điểm Mới ✨";
            document.getElementById('formTimelineId').value = '';
            document.getElementById('formDayNumber').value = currentDay;
            document.getElementById('formTimeSlot').value = '';
            document.getElementById('formLocation').value = '';
            document.getElementById('formLocationZh').value = '';
            document.getElementById('formContent').value = '';
            document.getElementById('formTransportGuide').value = '';
            document.getElementById('formNotes').value = '';
            document.getElementById('formStatus').value = 'Chưa đi';
            document.getElementById('costFormRowsContainer').innerHTML = '';
            openModal('timelineModal');
        }

        function editTimeline(id) {
            const item = globalTimelineData.find(x => x.id === id);
            if(!item) return;

            document.getElementById('modalTitle').innerText = "Chỉnh Sửa Hành Trình ✏️";
            document.getElementById('formTimelineId').value = item.id;
            document.getElementById('formDayNumber').value = item.day_number;
            document.getElementById('formTimeSlot').value = item.time_slot || '';
            document.getElementById('formLocation').value = item.location || '';
            document.getElementById('formLocationZh').value = item.location_zh || '';
            document.getElementById('formContent').value = item.content || '';
            document.getElementById('formTransportGuide').value = item.transport_guide || '';
            document.getElementById('formNotes').value = item.notes || '';
            document.getElementById('formStatus').value = item.status || 'Chưa đi';
            
            const container = document.getElementById('costFormRowsContainer');
            container.innerHTML = '';
            if(item.costs && item.costs.length > 0) {
                item.costs.forEach(c => addCostInputRow(c));
            }
            openModal('timelineModal');
        }

        async function saveTimelineBigData() {
            const id = document.getElementById('formTimelineId').value;
            const payload = {
                day_number: parseInt(document.getElementById('formDayNumber').value) || 1,
                time_slot: document.getElementById('formTimeSlot').value,
                location: document.getElementById('formLocation').value,
                location_zh: document.getElementById('formLocationZh').value,
                content: document.getElementById('formContent').value,
                transport_guide: document.getElementById('formTransportGuide').value,
                notes: document.getElementById('formNotes').value,
                status: document.getElementById('formStatus').value,
                costs: getCostsFromForm()
            };

            if(!payload.location) { alert("Bà nhập tên điểm đi giúp tui nhen!"); return; }

            await fetch(id ? `/api/timeline/${id}` : '/api/timeline', {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            closeModal('timelineModal');
            fetchAllData();
        }

        async function quickToggleStatus(id, currentStatus) {
            let nextStatus = 'Chưa đi';
            if(currentStatus === 'Chưa đi') nextStatus = 'Đang đi';
            else if(currentStatus === 'Đang đi') nextStatus = 'Đã xong';

            const item = globalTimelineData.find(x => x.id === id);
            if(!item) return;
            const payload = { ...item, status: nextStatus };

            await fetch(`/api/timeline/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            fetchAllData();
        }

        async function deleteTimeline(id) {
            if(confirm("Xóa điểm đi này là mất hết chi phí đi kèm đó nhe bà ơi, chắc chưa nà?")) {
                await fetch(`/api/timeline/${id}`, { method: 'DELETE' });
                fetchAllData();
            }
        }

        /* LOGIC POPUP HÀNH LÝ DROPDOWN */
        function openChecklistModal() {
            document.getElementById('formChecklistCategory').value = 'Giấy tờ';
            document.getElementById('formChecklistCustomCategory').value = '';
            document.getElementById('formChecklistItemName').value = '';
            document.getElementById('customCategoryWrapper').style.display = 'none';
            openModal('checklistModal');
        }

        function checkCustomCategory(val) {
            const wrapper = document.getElementById('customCategoryWrapper');
            if(val === '__CUSTOM__') {
                wrapper.style.display = 'block';
            } else {
                wrapper.style.display = 'none';
            }
        }

        async function saveChecklistData() {
            const selectEl = document.getElementById('formChecklistCategory');
            let cat = selectEl.value;
            
            // Nếu chọn mục tự thêm danh mục mới
            if(cat === '__CUSTOM__') {
                cat = document.getElementById('formChecklistCustomCategory').value.trim();
                if(!cat) { alert("Bà ơi hãy nhập tên danh mục mới nha!"); return; }
            }

            const name = document.getElementById('formChecklistItemName').value.trim();
            if(!name) { alert("Bà chưa nhập tên món đồ kìa!"); return; }

            await fetch('/api/checklist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ category: cat, item_name: name })
            });
            closeModal('checklistModal');
            fetchAllData();
        }

        async function toggleChecklist(id, isChecked) {
            await fetch(`/api/checklist/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_checked: isChecked ? 1 : 0 })
            });
            fetchAllData();
        }

        async function deleteChecklistItem(id) {
            if(confirm("Xóa món này khỏi vali nha bà iu?")) {
                await fetch(`/api/checklist/${id}`, { method: 'DELETE' });
                fetchAllData();
            }
        }

        window.onload = fetchAllData;
    </script>
</body>
</html>
